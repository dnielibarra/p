<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>IBARRA 8-BIT</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div id="console">

    <div id="header">

        <h1>🎮 IBARRA 8-BIT</h1>

        <button id="fullscreenBtn">
            ⛶
        </button>

    </div>

    <canvas id="screen"
            width="256"
            height="224">
    </canvas>

    <input
      type="file"
      id="romInput"
      accept=".smc,.sfc">

</div>

<div id="controls">

    <div id="dpad">

        <button id="up">▲</button>

        <div>

            <button id="left">◀</button>

            <button id="down">▼</button>

            <button id="right">▶</button>

        </div>

    </div>

    <div id="actionButtons">

        <button>A</button>
        <button>B</button>
        <button>X</button>
        <button>Y</button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
