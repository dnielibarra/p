<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBARRA 8-BIT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <div class="intro-box">
    <h1>IBARRA 8-BIT</h1>
    <p id="introText">INITIALIZING...</p>
  </div>
</div>

<button id="fullscreenBtn">⛶</button>

<main id="app">

  <section id="screenFrame">
    <div id="game"></div>
  </section>

  <div id="romBar">
    <label for="romInput" class="fileBtn">Seleccionar ROM</label>
    <input type="file" id="romInput" accept=".smc,.sfc,.zip">
    <span id="romName">Ninguna ROM cargada</span>
  </div>

  <section id="controls">

    <div id="dpad">
      <button data-key="ArrowUp">▲</button>
      <button data-key="ArrowLeft">◀</button>
      <div class="dcenter"></div>
      <button data-key="ArrowRight">▶</button>
      <button data-key="ArrowDown">▼</button>
    </div>

    <div id="actionButtons">
      <button data-key="KeyA">X</button>
      <button data-key="KeyX">A</button>
      <button data-key="KeyS">Y</button>
      <button data-key="KeyZ">B</button>
    </div>

    <div id="startSelect">
      <button data-key="ShiftRight">SELECT</button>
      <button data-key="Enter">START</button>
    </div>

  </section>

</main>

<script src="app.js"></script>
</body>
</html>
