<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>IBARRA 8-BIT</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- PRESENTACION -->

<div id="splash">

    <div id="logo">

        <h1>IBARRA 8-BIT</h1>

        <p>PRESENTA</p>

    </div>

</div>

<!-- EMULADOR -->

<div id="console">

    <div id="header">

        <button id="fullscreenBtn">
            ⛶
        </button>

    </div>

    <canvas id="screen"
            width="256"
            height="224">
    </canvas>

    <input type="file"
           id="romInput"
           accept=".smc,.sfc">

</div>

<div id="gameArea">

    <div id="dpad">

        <button id="up">▲</button>

        <button id="left">◀</button>

        <div id="center"></div>

        <button id="right">▶</button>

        <button id="down">▼</button>

    </div>

    <div id="actionButtons">

        <button>X</button>
        <button>A</button>

        <button>Y</button>
        <button>B</button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
