<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Scanner JS v4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* La cámara ahora aprovecha casi toda la pantalla de fondo */
        .camera-container {
            height: 75vh; 
            width: 100%;
            position: relative;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-overlay {
            position: absolute;
            top: 6%;
            left: 10%;
            width: 80%;
            height: 80%;
            border: 2px dashed rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            pointer-events: none;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 10pt;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 6px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .floating-scan-btn {
            pointer-events: auto;
            background-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 12pt;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        .floating-scan-btn:active {
            background-color: #ffffff;
            color: #000000;
            transform: scale(0.95);
        }

        /* ============================================================ */
        /* NUEVO: PANEL DESLIZABLE (BOTTOM SHEET)                       */
        /* ============================================================ */
        .controls-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            /* Altura colapsada por defecto (oculta filtros, muestra botones base) */
            height: 180px; 
            background-color: #1a1a1a;
            padding: 0 16px 55px 16px; /* 55px libres abajo para la barra de Android */
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.8);
            
            /* Animación suave al abrir y cerrar */
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        /* Cuando la clase 'open' se activa, el panel crece para revelar los filtros */
        .controls-panel.open {
            height: 290px;
        }

        /* Zona superior del panel que sirve para arrastrar/tocar */
        .panel-header {
            width: 100%;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* La rallita indicadora del centro estilo App Premium */
        .drag-handle {
            width: 40px;
            height: 4px;
            background-color: #48484a;
            border-radius: 2px;
            margin-bottom: 8px;
        }

        .filters-title {
            font-size: 9.5pt;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Indicador dinámico que cambia de dirección si está abierto o cerrado */
        .filters-title::after {
            content: "▲";
            font-size: 7pt;
            color: #007aff;
            transition: transform 0.3s ease;
        }
        .controls-panel.open .filters-title::after {
            transform: rotate(180deg); /* Se voltea cuando se expande */
        }

        /* Contenedor de filtros que se oculta/muestra dinámicamente */
        .filters-wrapper {
            opacity: 0;
            visibility: hidden;
            height: 0;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .controls-panel.open .filters-wrapper {
            opacity: 1;
            visibility: visible;
            height: auto;
            margin-bottom: 10px;
        }

        .filters-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
        }
        .filters-row::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background-color: #2c2c2e;
            color: #aeaeb2;
            border: none;
            padding: 9px 16px;
            border-radius: 20px;
            font-size: 9.5pt;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        .filter-btn.active {
            background-color: #007aff;
            color: #ffffff;
        }

        .format-row {
            width: 100%;
            position: relative;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            background-color: #2c2c2e;
            color: #ffffff;
            border: 1px solid #3a3a3c;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 10.5pt;
            appearance: none;
            outline: none;
            font-weight: 500;
        }

        .format-row::after {
            content: "▼";
            font-size: 8pt;
            color: #007aff;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .buttons-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn {
            flex: 1;
            border: none;
            padding: 14px 10px;
            border-radius: 10px;
            font-size: 10.5pt;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-share { background-color: #007aff; color: #ffffff; }
        .btn-download { background-color: #34c759; color: #ffffff; }

        #hiddenCanvas { display: none; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background-color: #30d158;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 10pt;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background-color: #ff3b30; }
    </style>
</head>
<body>

    <div class="toast" id="toastMessage">¡Procesando archivo!</div>

    <div class="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="scanner-overlay">
            <div class="info-label">Alinea el documento aquí</div>
            <button class="floating-scan-btn" onclick="processAndCapture()">SCAN</button>
        </div>
    </div>

    <div class="controls-panel" id="bottomSheet">
        <div class="panel-header" onclick="togglePanel()">
            <div class="drag-handle"></div>
            <p class="filters-title">Modo de Escáner</p>
        </div>

        <div class="filters-wrapper">
            <div class="filters-row">
                <button class="filter-btn active" onclick="setFilter('color', this)">Color Original</button>
                <button class="filter-btn" onclick="setFilter('bw', this)">Documento (B&N)</button>
                <button class="filter-btn" onclick="setFilter('gray', this)">Escala Grises</button>
                <button class="filter-btn" onclick="setFilter('enhance', this)">Realce Postal</button>
            </div>
        </div>

        <div class="format-row">
            <select id="fileFormat">
                <option value="pdf">Formato PDF (.pdf)</option>
                <option value="jpeg">Imagen JPEG (.jpg)</option>
                <option value="png">Imagen PNG (.png)</option>
            </select>
        </div>
        
        <div class="buttons-group">
            <button class="btn btn-share" onclick="executeAction('share')">📲 COMPARTIR</button>
            <button class="btn btn-download" onclick="executeAction('download')">💾 DESCARGAR</button>
        </div>
    </div>

    <canvas id="hiddenCanvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const formatSelect = document.getElementById('fileFormat');
        const toast = document.getElementById('toastMessage');
        const bottomSheet = document.getElementById('bottomSheet');
        
        let currentFilter = 'color';
        let isCaptured = false;

        // Función para abrir/cerrar el panel desde la pestaña
        function togglePanel() {
            bottomSheet.classList.toggle('open');
        }

        async function initCamera() {
            const constraints = {
                video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: false
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                showToast("Error al abrir cámara. Usa HTTPS.", true);
            }
        }

        function setFilter(filterType, buttonEl) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            buttonEl.classList.add('active');
            if(isCaptured) applyFilters();
        }

        function processAndCapture() {
            if (!video.srcObject || video.videoWidth === 0) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            isCaptured = true;
            applyFilters();
            showToast("¡Captura lista! Elige formato abajo.");
            
            // TIP PRO: Si toman la foto con el panel cerrado, se abre automáticamente para ajustar filtros
            if(!bottomSheet.classList.contains('open')) {
                togglePanel();
            }
        }

        function applyFilters() {
            if(!isCaptured) return;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            if (currentFilter === 'gray') {
                for (let i = 0; i < data.length; i += 4) {
                    let intensity = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                    data[i] = data[i+1] = data[i+2] = intensity;
                }
                ctx.putImageData(imageData, 0, 0);
            } 
            else if (currentFilter === 'bw') {
                for (let i = 0; i < data.length; i += 4) {
                    let v = 0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
                    v = (v - 128) * 2.5 + 128; 
                    let finalColor = v > 135 ? 255 : 0;
                    data[i] = data[i+1] = data[i+2] = finalColor;
                }
                ctx.putImageData(imageData, 0, 0);
            } 
            else if (currentFilter === 'enhance') {
                for (let i = 0; i < data.length; i += 4) {
                    data[i]     = Math.min(255, data[i] * 1.2);
                    data[i + 1] = Math.min(255, data[i + 1] * 1.15);
                    data[i + 2] = Math.min(255, data[i + 2] * 0.9);
                }
                ctx.putImageData(imageData, 0, 0);
            }
        }

        function executeAction(actionType) {
            if (!isCaptured) processAndCapture();

            const selectedFormat = formatSelect.value;
            const timestamp = new Date().toISOString().slice(0,10).replace(/-/g,"");
            const baseFileName = `escaneo_${timestamp}`;

            if (actionType === 'download') {
                if (selectedFormat === 'pdf') {
                    generatePDFBlob().save(`${baseFileName}.pdf`);
                    showToast("¡PDF Guardado!");
                } else {
                    const mime = selectedFormat === 'png' ? 'image/png' : 'image/jpeg';
                    const ext = selectedFormat === 'png' ? 'png' : 'jpg';
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL(mime, 0.9);
                    link.download = `${baseFileName}.${ext}`;
                    link.click();
                    showToast("¡Imagen Guardada!");
                }
            } 
            else if (actionType === 'share') {
                executeNativeShare(selectedFormat, baseFileName);
            }
        }

        function generatePDFBlob() {
            const { jsPDF } = window.jspdf;
            const imgData = canvas.toDataURL('image/jpeg', 0.85);
            const orientation = canvas.width > canvas.height ? 'l' : 'p';
            const pdf = new jsPDF({ orientation: orientation, unit: 'mm', format: 'a4' });
            pdf.addImage(imgData, 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
            return pdf;
        }

        async function executeNativeShare(format, fileName) {
            if (!navigator.share) {
                showToast("Tu navegador no soporta compartir.", true);
                return;
            }
            try {
                let fileBlob, fullFileName, mimeType;
                if (format === 'pdf') {
                    const pdfObj = generatePDFBlob();
                    const arrayBuffer = pdfObj.output('arraybuffer');
                    mimeType = 'application/pdf';
                    fileBlob = new Blob([arrayBuffer], { type: mimeType });
                    fullFileName = `${fileName}.pdf`;
                } else {
                    mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
                    const ext = format === 'png' ? 'png' : 'jpg';
                    fullFileName = `${fileName}.${ext}`;
                    fileBlob = await new Promise(resolve => canvas.toBlob(resolve, mimeType, 0.9));
                }

                const fileToShare = new File([fileBlob], fullFileName, { type: mimeType });

                if (navigator.canShare && navigator.canShare({ files: [fileToShare] })) {
                    await navigator.share({ files: [fileToShare], title: 'Documento Escaneado', text: 'Listo para enviar.' });
                } else {
                    showToast("No se permite compartir este archivo.", true);
                }
            } catch (err) {
                if(err.name !== 'AbortError') showToast("No se pudo compartir.", true);
            }
        }

        function showToast(message, isError = false) {
            toast.innerText = message;
            if(isError) toast.classList.add('error');
            else toast.classList.remove('error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
